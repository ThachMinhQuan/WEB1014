<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<form>
    <h3>Họ và tên:</h3>
    <input type="text" name="hoten"><br>

    <h3>Giới tính:</h3>
    <input type="radio" name="gioitinh"> Nam
    <input type="radio" name="gioitinh"> Nữ
    <br><br>

    <h3>Hình ảnh:</h3>
    <input type="file" name="hinhanh">
    <br><br>

    <h3>Quốc tịch:</h3>
    <select name="quoctich">
        <option>United States</option>
        <option>Viet Nam</option>
        <option>Japan</option>
        <option>Korea</option>
    </select>
    <br><br>

    <h3>Sở thích:</h3>
    <input type="checkbox"> Thể thao
    <input type="checkbox"> Du lịch
    <input type="checkbox"> Âm nhạc
    <input type="checkbox"> Ẩm thực
    <br><br>

    <h3>Ghi chú:</h3>
    <textarea rows="4" cols="20"></textarea>
    <br><br>

    <hr>

    <input type="submit" value="Đăng ký">
    <input type="reset" value="Nhập lại">

</form>
</body>
</html>
